services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://postgres:postgrespassword@postgres:5432/uplive_db?schema=public}
      APP_URL: ${APP_URL:-http://localhost:3001}
      STORAGE_ROOT: ${DOCKER_STORAGE_ROOT:-/app/data}
      YT_DLP_BIN: ${DOCKER_YT_DLP_BIN:-/usr/local/bin/yt-dlp}
      FFMPEG_BIN: ${DOCKER_FFMPEG_BIN:-/usr/bin/ffmpeg}
      FFPROBE_BIN: ${DOCKER_FFPROBE_BIN:-/usr/bin/ffprobe}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000 > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    mem_limit: 1g
    cpus: 0.5
    volumes:
      - app_data:/app/data

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DOCKER_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DOCKER_DB_PASSWORD:-postgrespassword}
      POSTGRES_DB: ${DOCKER_DB_NAME:-uplive_db}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DOCKER_DB_USER:-postgres} -d ${DOCKER_DB_NAME:-uplive_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  app_data:
  postgres_data:
